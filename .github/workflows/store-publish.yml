name: Publish to Microsoft Store

# Pushes an MSIX update to an already-live Microsoft Store listing using the
# Microsoft Store Developer CLI (msstore). Per Microsoft's docs, automated
# updates require the app to be already published in the Store (your first
# v1.1.1 submission must be through certification + live) and to be a free
# product (we are). See packaging/msix/README.md for setup details.

on:
  # Run automatically when the CI/release job publishes a new GitHub release.
  release:
    types: [published]
  # Allow manual triggers (useful for the first end-to-end test and re-runs).
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish to the Store (e.g. v1.1.2). Defaults to the latest release."
        required: false
        type: string

jobs:
  publish:
    runs-on: windows-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      # Pick the tag: from the release event, or from manual input, or fall
      # back to the latest published release.
      - name: Resolve release tag
        id: tag
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [[ -n "$EVENT_TAG" ]]; then
            tag="$EVENT_TAG"
          elif [[ -n "$INPUT_TAG" ]]; then
            tag="$INPUT_TAG"
          else
            tag=$(gh release view --json tagName -q .tagName)
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Publishing tag: $tag"

      - name: Download Windows release binary
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: gh release download "$TAG" -p 'nvg-windows-amd64.exe'

      # Build the MSIX with the real Store identity (from repo vars; placeholders
      # would be rejected by the Store).
      - name: Build MSIX
        shell: pwsh
        env:
          MSIX_IDENTITY_NAME: ${{ vars.MSIX_IDENTITY_NAME }}
          MSIX_PUBLISHER: ${{ vars.MSIX_PUBLISHER }}
          MSIX_PUBLISHER_DISPLAY_NAME: ${{ vars.MSIX_PUBLISHER_DISPLAY_NAME }}
        run: |
          $params = @{ ExePath = 'nvg-windows-amd64.exe'; OutFile = "$env:RUNNER_TEMP/nvg.msix" }
          if ($env:MSIX_IDENTITY_NAME)          { $params.IdentityName = $env:MSIX_IDENTITY_NAME }
          if ($env:MSIX_PUBLISHER)              { $params.Publisher = $env:MSIX_PUBLISHER }
          if ($env:MSIX_PUBLISHER_DISPLAY_NAME) { $params.PublisherDisplayName = $env:MSIX_PUBLISHER_DISPLAY_NAME }
          ./packaging/msix/build-msix.ps1 @params

      - name: Set up Microsoft Store CLI
        uses: microsoft/microsoft-store-apppublisher@v1.1

      # Credentials are passed via env so PowerShell doesn't expand them
      # inline (avoids any quoting surprises if a value ever contains a `$`).
      - name: Configure msstore credentials
        shell: pwsh
        env:
          TENANT_ID: ${{ secrets.AZURE_AD_TENANT_ID }}
          SELLER_ID: ${{ secrets.SELLER_ID }}
          CLIENT_ID: ${{ secrets.AZURE_AD_APPLICATION_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.AZURE_AD_APPLICATION_SECRET }}
        run: |
          msstore reconfigure `
            --verbose `
            --tenantId     $env:TENANT_ID `
            --sellerId     $env:SELLER_ID `
            --clientId     $env:CLIENT_ID `
            --clientSecret $env:CLIENT_SECRET

      - name: Publish MSIX to Microsoft Store
        shell: pwsh
        env:
          PRODUCT_ID: ${{ vars.MSSTORE_PRODUCT_ID }}
        run: msstore publish "$env:RUNNER_TEMP/nvg.msix" -id $env:PRODUCT_ID
